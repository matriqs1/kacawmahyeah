<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>kacaw manyeah  </title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🕷️</text></svg>">
  <meta name="description" content="A special birthday surprise — enter the password to unlock your gift." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Global web corner decorations (JS fills these) -->
  <div class="web-corner web-tl" id="webTL"></div>
  <div class="web-corner web-tr" id="webTR"></div>
  <div class="web-corner web-bl" id="webBL"></div>
  <div class="web-corner web-br" id="webBR"></div>

  <!-- Web-shoot click FX container -->
  <div id="webFxContainer" aria-hidden="true"></div>

  <!-- Swinging spider (JS animates) -->
  <div class="spider-swing" id="spiderSwing" aria-hidden="true">
    <div class="spider-thread" id="spiderThread"></div>
    <div class="spider-icon">🕷️</div>
  </div>


  <!-- Floating balloons (JS fills) -->
  <div id="balloonContainer" aria-hidden="true"></div>

  <!-- SCREEN 0 — COUNTDOWN -->
  <section id="screen-cd" class="screen" role="main">
    <div class="screen-inner">
      <div class="cd-cake"></div>
      <h1 class="cd-title"><br/>coming soon…</h1>
      <p class="cd-unlock-date"></p>
      <div class="cd-timer" id="cdTimer">
        <div class="cd-unit">
          <span class="cd-num" id="cdDays">00</span>
          <span class="cd-label">hari</span>
        </div>
        <div class="cd-sep">:</div>
        <div class="cd-unit">
          <span class="cd-num" id="cdHours">00</span>
          <span class="cd-label">jam</span>
        </div>
        <div class="cd-sep">:</div>
        <div class="cd-unit">
          <span class="cd-num" id="cdMinutes">00</span>
          <span class="cd-label">menit</span>
        </div>
        <div class="cd-sep">:</div>
        <div class="cd-unit">
          <span class="cd-num" id="cdSeconds">00</span>
          <span class="cd-label">detik</span>
        </div>
      </div>
      <p class="cd-hint">Stay tuned</p>
    </div>
  </section>

  <!-- SCREEN 1 — PASSWORD -->
  <section id="screen-pass" class="screen" role="main">
    <div class="screen-inner">

      <div class="lock-wrap" id="lockWrap">
        <svg class="lock-svg" viewBox="0 0 80 80" width="72" height="72">
          <!-- decorative web ring -->
          <circle cx="40" cy="40" r="36" fill="none" stroke="rgba(255,255,255,.18)" stroke-width="1"/>
          <circle cx="40" cy="40" r="24" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="1"/>
          <line x1="40" y1="4"  x2="40" y2="76" stroke="rgba(255,255,255,.12)" stroke-width=".8"/>
          <line x1="4"  y1="40" x2="76" y2="40" stroke="rgba(255,255,255,.12)" stroke-width=".8"/>
          <line x1="14" y1="14" x2="66" y2="66" stroke="rgba(255,255,255,.10)" stroke-width=".8"/>
          <line x1="66" y1="14" x2="14" y2="66" stroke="rgba(255,255,255,.10)" stroke-width=".8"/>
          <!-- lock body -->
          <rect x="24" y="38" width="32" height="26" rx="5" fill="white" opacity=".92"/>
          <path d="M29 38 V28 a11 11 0 0 1 22 0 V38" fill="none" stroke="white" stroke-width="4.5" stroke-linecap="round" opacity=".92"/>
          <circle cx="40" cy="52" r="4" fill="#111"/>
          <rect x="38.5" y="52" width="3" height="7" rx="1.5" fill="#111"/>
        </svg>
      </div>


      <h1 class="pass-title">210508</h1>

      <div class="pass-form" id="passForm">
        <div class="input-wrap">
          <input
            type="password"
            id="passInput"
            class="pass-input"
            placeholder="apa haiyooo"
            autocomplete="off"
            maxlength="30"
            onkeydown="if(event.key==='Enter')checkPassword()"
          />
          <button class="eye-btn" id="eyeBtn" onclick="togglePass()" title="Toggle visibility" type="button">👁</button>
        </div>
        <button class="btn-primary" id="btnUnlock" onclick="checkPassword()">
          lesgoo <span class="btn-arrow">→</span>
        </button>
        <p class="pass-error" id="passError">❌ Wrong password. Try again!</p>
      </div>


    </div>
  </section>

  <!-- ════════════════════════════════
       SCREEN 2 — GIFT BOX
  ════════════════════════════════ -->
  <section id="screen-gift" class="screen">
    <div class="screen-inner">

      <h1 class="gift-title">Happy Birthday,<br/><em id="giftNameEl" class="italic-name"></em></h1>

      <div class="gift-stage" id="giftStage">
        <!-- 3-tier cake -->
        <div class="cake-wrap" id="giftBox" onclick="openGiftBox()" role="button" tabindex="0" aria-label="Click the cake">
          <!-- Top tier -->
          <div class="cake-tier t3" id="cakeTop">
            <!-- Candles inside top tier -->
            <div class="cake-candles">
              <div class="candle"><div class="flame" id="fl1"></div></div>
              <div class="candle"><div class="flame" id="fl2"></div></div>
              <div class="candle"><div class="flame" id="fl3"></div></div>
            </div>
            <div class="tier-frost">
              <span class="drip" style="left:20%"></span>
              <span class="drip" style="left:55%"></span>
              <span class="drip" style="left:80%"></span>
            </div>
          </div>
          <!-- Middle tier -->
          <div class="cake-tier t2">
            <div class="tier-frost">
              <span class="drip" style="left:12%"></span>
              <span class="drip" style="left:35%"></span>
              <span class="drip" style="left:62%"></span>
              <span class="drip" style="left:85%"></span>
            </div>
          </div>
          <!-- Bottom tier -->
          <div class="cake-tier t1">
            <div class="tier-frost">
              <span class="drip" style="left:10%"></span>
              <span class="drip" style="left:28%"></span>
              <span class="drip" style="left:48%"></span>
              <span class="drip" style="left:68%"></span>
              <span class="drip" style="left:86%"></span>
            </div>
          </div>
          <!-- Plate -->
          <div class="cake-plate"></div>
        </div>
        <p class="click-hint" id="clickHintEl"> 🕸️</p>
      </div>
    </div>
  </section>

  <!-- ════════════════════════════════
       SCREEN 3 — FLIP CARDS
  ════════════════════════════════ -->
  <section id="screen-cards" class="screen">
    <div class="screen-inner">

      <h1 class="cards-title">ada apa aja yaaa
      </h1>

      <div class="cards-row" id="cardsRow">

        <!-- Card 1 -->
        <div class="flip-card" id="fcard1" onclick="flipCard(1)" role="button" tabindex="0" aria-label="Memory card 1">
          <div class="flip-inner" id="fi1">
            <div class="flip-front">
              <div class="front-web"></div>
              <span class="front-num">01</span>
            </div>
            <div class="flip-back" id="fb1">
              <div class="back-photo-wrap">
                <img class="back-photo" id="bphoto1" src="" alt="First Pap" />
                <div class="no-photo" id="nophoto1">📷</div>
              </div>
              <div class="back-info">
                <span class="back-num">01</span>
                <h3 class="back-title" id="btitle1">First Pap</h3>
                <p class="back-desc" id="bdesc1"></p>
              </div>
            </div>
          </div>
        </div>

        <!-- Card 2 -->
        <div class="flip-card" id="fcard2" onclick="flipCard(2)" role="button" tabindex="0" aria-label="Memory card 2">
          <div class="flip-inner" id="fi2">
            <div class="flip-front">
              <div class="front-web"></div>
              <span class="front-num">02</span>
            </div>
            <div class="flip-back" id="fb2">
              <div class="back-photo-wrap">
                <img class="back-photo" id="bphoto2" src="" alt="Our First Selfie" />
                <div class="no-photo" id="nophoto2">📷</div>
              </div>
              <div class="back-info">
                <span class="back-num">02</span>
                <h3 class="back-title" id="btitle2">Our First Selfie</h3>
                <p class="back-desc" id="bdesc2"></p>
              </div>
            </div>
          </div>
        </div>

        <!-- Card 3 -->
        <div class="flip-card" id="fcard3" onclick="flipCard(3)" role="button" tabindex="0" aria-label="Memory card 3">
          <div class="flip-inner" id="fi3">
            <div class="flip-front">
              <div class="front-web"></div>
              <span class="front-num">03</span>
            </div>
            <div class="flip-back" id="fb3">
              <div class="back-photo-wrap">
                <img class="back-photo" id="bphoto3" src="" alt="Our Memory" />
                <div class="no-photo" id="nophoto3">📷</div>
              </div>
              <div class="back-info">
                <span class="back-num">03</span>
                <h3 class="back-title" id="btitle3">Our Memory</h3>
                <p class="back-desc" id="bdesc3"></p>
              </div>
            </div>
          </div>
        </div>

        <!-- Card 4 (landscape) -->
        <div class="flip-card" id="fcard4" onclick="flipCard(4)" role="button" tabindex="0" aria-label="Memory card 4">
          <div class="flip-inner" id="fi4">
            <div class="flip-front">
              <div class="front-web"></div>
              <span class="front-num">04</span>
            </div>
            <div class="flip-back" id="fb4">
              <div class="back-photo-wrap">
                <img class="back-photo" id="bphoto4" src="" alt="Memory 4" />
                <div class="no-photo" id="nophoto4">📷</div>
              </div>
              <div class="back-info">
                <span class="back-num">04</span>
                <h3 class="back-title" id="btitle4">Our Memory</h3>
                <p class="back-desc" id="bdesc4"></p>
              </div>
            </div>
          </div>
        </div>



      <div class="cards-cta" id="cardsCta">
        <button class="btn-primary" onclick="showMessage()">next gaa nihh
        </button>
      </div>
    </div>
  </section>

  <!-- ════════════════════════════════
       SCREEN 4 — MESSAGE
  ════════════════════════════════ -->
  <section id="screen-msg" class="screen">
    <canvas id="sparkCanvas" aria-hidden="true"></canvas>
    <div class="screen-inner">

      <h1 class="msg-title">yeay uda 18</h1>

      <div class="msg-card" id="msgCard">
        <div class="msg-web-corner tl"></div>
        <div class="msg-web-corner tr"></div>
        <p class="msg-body" id="msgBody"></p>
      </div>

      <div class="msg-footer">
        <p class="msg-date" id="msgDate"></p>
        <button class="btn-primary btn-bouquet" onclick="showBouquet()">A little something for you <span class="btn-arrow">→</span></button>
      </div>
    </div>
  </section>

  <!-- ════════════════════════════════
       SCREEN 5 — BOUQUET
  ════════════════════════════════ -->
  <section id="screen-bouquet" class="screen">
    <div class="screen-inner">
      <h1 class="bq-title">ayo fotbar??</h1>
      <div class="bouquet-wrap" id="bouquetWrap">
        <svg class="bouquet-svg megah" viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
          <g fill="none" stroke="rgba(255,255,255,0.95)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <!-- Multiple Stems -->
            <path class="svg-draw" d="M 150,330 C 150,250 150,200 150,160" />
            <path class="svg-draw" d="M 140,330 C 130,280 140,210 120,160" />
            <path class="svg-draw" d="M 160,330 C 170,280 160,210 180,160" />
            <path class="svg-draw" d="M 130,320 C 110,280 120,220 90,160" />
            <path class="svg-draw" d="M 170,320 C 190,280 180,220 210,160" />

            <!-- Ribbon -->
            <path class="svg-draw" d="M 120,260 C 100,255 95,240 120,245 C 150,250 180,240 180,255 C 180,270 150,260 120,260 Z" />
            <path class="svg-draw" d="M 140,255 C 160,300 190,360 210,380" />
            <path class="svg-draw" d="M 150,255 C 130,310 90,370 70,390" />
            <path class="svg-draw" d="M 145,255 C 145,300 130,350 120,380" />

            <!-- Ferns / Tall Leaves -->
            <path class="svg-draw" d="M 150,160 C 130,100 80,60 40,40" />
            <path class="svg-draw" d="M 150,160 C 170,100 220,60 260,40" />
            <path class="svg-draw" d="M 150,160 C 150,100 150,50 150,20" />
            <path class="svg-draw" d="M 120,160 C 90,120 50,100 20,110" />
            <path class="svg-draw" d="M 180,160 C 210,120 250,100 280,110" />

            <!-- Center Big Rose -->
            <path class="svg-draw" d="M 150,140 C 175,145 190,120 180,95 C 170,70 140,65 125,85 C 110,105 115,130 140,140 C 165,150 180,130 165,110 C 150,90 130,105 140,120 C 150,135 160,125 155,115 C 150,105 145,115 150,125" />

            <!-- Left Rose 1 -->
            <path class="svg-draw" d="M 100,160 C 120,165 130,145 125,130 C 120,115 100,110 90,125 C 80,140 85,155 100,165 C 115,175 125,160 115,145 C 105,130 90,140 95,150 C 100,160 110,155 105,145" />

            <!-- Right Rose 1 -->
            <path class="svg-draw" d="M 200,160 C 180,165 170,145 175,130 C 180,115 200,110 210,125 C 220,140 215,155 200,165 C 185,175 175,160 185,145 C 195,130 210,140 205,150 C 200,160 190,155 195,145" />

            <!-- Top Left Rose -->
            <path class="svg-draw" d="M 110,110 C 125,115 135,100 130,85 C 125,70 110,65 100,80 C 90,95 95,110 110,115 C 125,120 135,105 125,95 C 115,85 105,90 110,100" />

            <!-- Top Right Rose -->
            <path class="svg-draw" d="M 190,110 C 175,115 165,100 170,85 C 175,70 190,65 200,80 C 210,95 205,110 190,115 C 175,120 165,105 175,95 C 185,85 195,90 190,100" />

            <!-- Bottom Left Rose -->
            <path class="svg-draw" d="M 80,200 C 95,200 105,185 100,175 C 95,165 80,160 70,170 C 60,180 65,195 80,200 C 95,205 105,195 95,185 C 85,175 75,180 80,190" />

            <!-- Bottom Right Rose -->
            <path class="svg-draw" d="M 220,200 C 205,200 195,185 200,175 C 205,165 220,160 230,170 C 240,180 235,195 220,200 C 205,205 195,195 205,185 C 215,175 225,180 220,190" />

            <!-- Filler Leaves/Twigs -->
            <path class="svg-draw" d="M 130,130 C 110,125 100,115 105,105 C 110,95 125,105 130,130 Z" />
            <path class="svg-draw" d="M 170,130 C 190,125 200,115 195,105 C 190,95 175,105 170,130 Z" />
            <path class="svg-draw" d="M 150,180 C 130,190 110,195 105,185 C 100,175 120,170 150,180 Z" />
            <path class="svg-draw" d="M 150,180 C 170,190 190,195 195,185 C 200,175 180,170 150,180 Z" />
            <path class="svg-draw" d="M 120,90 C 110,80 105,70 115,65 C 125,60 130,80 120,90 Z" />
            <path class="svg-draw" d="M 180,90 C 190,80 195,70 185,65 C 175,60 170,80 180,90 Z" />
          </g>
        </svg>
      </div>
      <p class="bq-desc">kita jalanin bareng-bareng yaaa</p>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
